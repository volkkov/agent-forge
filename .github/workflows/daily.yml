name: Daily collect & evaluate

on:
  schedule:
    # Three attempts per day, spread across morning/afternoon/evening
    # (times below are UTC; user's local zone is UTC+3, so these land
    # around ~11:00, ~16:00, ~22:00 local). Each cron fires at a fixed
    # minute, then the job itself sleeps a random 0-50 minutes before
    # doing any work — this randomizes the *actual* run time within each
    # window without needing extra cron lines, and avoids hitting GitHub's
    # most-loaded top-of-hour slot every time. Scripts are idempotent
    # (already-evaluated repos are skipped), so multiple runs per day are
    # harmless — each just makes forward progress on the candidate queue.
    - cron: "5 8 * * *"   # ~11:05 local
    - cron: "5 13 * * *"  # ~16:05 local
    - cron: "5 19 * * *"  # ~22:05 local
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect-and-evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Random delay within this run's window (skipped for manual runs)
        if: github.event_name == 'schedule'
        run: sleep $(( RANDOM % 3000 ))

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect candidate repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/collect.py

      - name: Evaluate candidates via OpenRouter
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_KEY_2: ${{ secrets.OPENAI_API_KEY_2 }}
          OPENAI_API_KEY_3: ${{ secrets.OPENAI_API_KEY_3 }}
        run: python scripts/evaluate.py

      - name: Generate daily report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/daily_report.py

      - name: Sync data into site/data (Vercel serves from here)
        run: |
          mkdir -p site/data
          cp data/repos.json site/data/repos.json
          cp data/i18n.json site/data/i18n.json

      - name: Commit updated data
        run: |
          git config user.name "agent-forge-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/repos.json site/data/repos.json site/data/i18n.json reports/
          git diff --cached --quiet || git commit -m "chore: daily collect & evaluate $(date -u +%Y-%m-%d)"
          git push
