name: Daily collect & evaluate

on:
  schedule:
    # Two scheduled attempts per day, an hour apart, both off the top of
    # the hour (GitHub deprioritizes/drops scheduled runs more often at
    # :00, the highest-load minute). If the 06:17 run gets skipped or
    # dropped due to GitHub-side load, the 07:23 run picks up the same
    # day's work — scripts are idempotent (already-evaluated repos are
    # skipped), so a second run on the same day does no harm.
    - cron: "17 6 * * *"
    - cron: "23 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect-and-evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect candidate repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/collect.py

      - name: Evaluate candidates via OpenRouter
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/evaluate.py

      - name: Generate daily report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/daily_report.py

      - name: Sync data into site/data (Vercel serves from here)
        run: |
          mkdir -p site/data
          cp data/repos.json site/data/repos.json
          cp data/i18n.json site/data/i18n.json

      - name: Commit updated data
        run: |
          git config user.name "agent-forge-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/repos.json site/data/repos.json site/data/i18n.json reports/
          git diff --cached --quiet || git commit -m "chore: daily collect & evaluate $(date -u +%Y-%m-%d)"
          git push
