name: Daily collect & evaluate

on:
  schedule:
    # TEMP: every 10 minutes, just to confirm GitHub re-recognizes this
    # schedule after several recent edits. Revert to the daily "17 6 * * *"
    # cron once a scheduled (non-manual) run shows up in the Actions tab.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect-and-evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect candidate repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/collect.py

      - name: Evaluate candidates via OpenRouter
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/evaluate.py

      - name: Generate daily report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/daily_report.py

      - name: Sync data into site/data (Vercel serves from here)
        run: |
          mkdir -p site/data
          cp data/repos.json site/data/repos.json
          cp data/i18n.json site/data/i18n.json

      - name: Commit updated data
        run: |
          git config user.name "agent-forge-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/repos.json site/data/repos.json site/data/i18n.json reports/
          git diff --cached --quiet || git commit -m "chore: daily collect & evaluate $(date -u +%Y-%m-%d)"
          git push
